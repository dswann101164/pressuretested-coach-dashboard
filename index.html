<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pressure Tested — Coach Dashboard</title>
<style>
  :root {
    --navy: #0D1B2A;
    --navy-mid: #14263A;
    --navy-light: #1C3350;
    --gold: #C9A84C;
    --gold-dim: #9B7E38;
    --white: #F5F5F5;
    --muted: #8899AA;
    --red: #E05555;
    --green: #4CAF7D;
    --amber: #E0A030;
    --font: 'Segoe UI', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--navy); color: var(--white); font-family: var(--font); min-height: 100vh; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; border-bottom: 1px solid var(--navy-light); background: var(--navy); position: sticky; top: 0; z-index: 10; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark { width: 32px; height: 32px; background: var(--gold); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; color: var(--navy); }
  .brand-name { font-size: 15px; font-weight: 700; letter-spacing: 0.04em; }
  .brand-sub { font-size: 11px; color: var(--muted); }
  .header-meta { font-size: 12px; color: var(--muted); }
  main { padding: 24px 28px; max-width: 1280px; margin: 0 auto; }
  .summary-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
  .stat-card { background: var(--navy-mid); border: 1px solid var(--navy-light); border-radius: 10px; padding: 16px 20px; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-value { font-size: 26px; font-weight: 700; }
  .stat-value.gold { color: var(--gold); }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .panels { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
  .panel { background: var(--navy-mid); border: 1px solid var(--navy-light); border-radius: 10px; overflow: hidden; }
  .panel-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--navy-light); }
  .panel-title { font-size: 13px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: var(--gold); }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: rgba(255,255,255,0.03); }
  th { padding: 10px 16px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); text-align: left; }
  tbody tr { border-top: 1px solid rgba(255,255,255,0.04); cursor: pointer; transition: background 0.12s; }
  tbody tr:hover { background: rgba(201,168,76,0.06); }
  td { padding: 11px 16px; font-size: 13px; }
  td.name { font-weight: 600; }
  td.niche { font-size: 11px; color: var(--muted); max-width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .score-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 700; }
  .score-badge.high { background: rgba(76,175,125,0.18); color: var(--green); }
  .score-badge.mid { background: rgba(224,160,48,0.18); color: var(--amber); }
  .score-badge.low { background: rgba(224,85,85,0.18); color: var(--red); }
  .delta { font-size: 12px; font-weight: 600; }
  .delta.up { color: var(--green); }
  .delta.down { color: var(--red); }
  .delta.flat { color: var(--muted); }
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .status-dot.active { background: var(--green); }
  .status-dot.watch { background: var(--amber); }
  .status-dot.critical { background: var(--red); }
  .attention-list { padding: 8px 0; }
  .attention-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 16px; border-top: 1px solid rgba(255,255,255,0.04); cursor: pointer; transition: background 0.12s; }
  .attention-item:first-child { border-top: none; }
  .attention-item:hover { background: rgba(201,168,76,0.06); }
  .attention-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .attention-name { font-size: 13px; font-weight: 600; }
  .attention-reason { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .bar-container { padding: 4px 0 2px; }
  .bar-track { height: 5px; background: var(--navy-light); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; background: var(--gold); }
  .bar-label { font-size: 10px; color: var(--muted); margin-top: 3px; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .overlay.open { display: flex; }
  .modal { background: var(--navy-mid); border: 1px solid var(--navy-light); border-radius: 12px; width: 680px; max-width: 100%; max-height: 90vh; overflow-y: auto; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; border-bottom: 1px solid var(--navy-light); position: sticky; top: 0; background: var(--navy-mid); z-index: 1; }
  .modal-header h2 { font-size: 16px; font-weight: 700; }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; line-height: 1; padding: 4px 8px; border-radius: 4px; }
  .modal-close:hover { color: var(--white); background: rgba(255,255,255,0.08); }
  .modal-body { padding: 20px 24px; }
  .client-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--navy-light); }
  .info-block.wide { grid-column: 1 / -1; }
  .info-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 4px; }
  .info-value { font-size: 14px; }
  .info-value a { color: var(--gold); text-decoration: none; }
  .info-value a:hover { text-decoration: underline; }
  .info-value.empty { color: var(--muted); font-style: italic; }
  .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--gold); margin: 18px 0 10px; }
  .run-history-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: rgba(255,255,255,0.03); border-radius: 7px; margin-bottom: 8px; }
  .run-date { font-size: 12px; color: var(--muted); }
  .run-score { font-size: 16px; font-weight: 700; }
  .run-delta-badge { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 4px; }
  .run-delta-badge.up { background: rgba(76,175,125,0.18); color: var(--green); }
  .run-delta-badge.down { background: rgba(224,85,85,0.18); color: var(--red); }
  .repair-item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 14px; background: rgba(224,85,85,0.07); border-left: 3px solid var(--red); border-radius: 0 6px 6px 0; margin-bottom: 7px; font-size: 13px; }
  .repair-priority { font-size: 10px; font-weight: 700; color: var(--red); text-transform: uppercase; margin-top: 2px; white-space: nowrap; }
  .btn-gold { background: var(--gold); color: var(--navy); border: none; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; }
  .btn-gold:hover { background: #dbb85a; }
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 5px; }
  .form-input { width: 100%; background: var(--navy-light); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 9px 12px; color: var(--white); font-size: 14px; font-family: var(--font); outline: none; }
  .form-input:focus { border-color: var(--gold); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--green); color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; display: none; z-index: 200; }
  .toast.show { display: block; }
  .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="brand-mark">PT</div>
    <div>
      <div class="brand-name">PRESSURE TESTED</div>
      <div class="brand-sub">Coach Dashboard</div>
    </div>
  </div>
  <div class="header-meta" id="headerMeta">Loading…</div>
</header>
<main>
  <div class="summary-row">
    <div class="stat-card"><div class="stat-label">Total Clients</div><div class="stat-value gold" id="statTotal">—</div></div>
    <div class="stat-card"><div class="stat-label">Avg Signal Score</div><div class="stat-value" id="statAvg">—</div></div>
    <div class="stat-card"><div class="stat-label">Needs Attention</div><div class="stat-value red" id="statWatch">—</div></div>
    <div class="stat-card"><div class="stat-label">Improving (30d)</div><div class="stat-value green" id="statImproving">—</div></div>
  </div>
  <div class="panels">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">All Clients</span>
        <button class="btn-gold" onclick="openIntake()">+ Add Client</button>
      </div>
      <div id="clientTableWrap"><div class="loading">Loading clients…</div></div>
    </div>
    <div>
      <div class="panel">
        <div class="panel-header"><span class="panel-title">⚠ Needs Attention</span></div>
        <div class="attention-list" id="attentionList"><div class="loading">…</div></div>
      </div>
    </div>
  </div>
</main>

<!-- CLIENT DETAIL MODAL -->
<div class="overlay" id="clientOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalClientName">Client</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody">Loading…</div>
  </div>
</div>

<!-- ADD CLIENT MODAL -->
<div class="overlay" id="intakeOverlay">
  <div class="modal" style="width:500px">
    <div class="modal-header">
      <h2>New Client</h2>
      <button class="modal-close" onclick="closeIntake()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Name *</label>
          <input class="form-input" id="intakeName" placeholder="Full name" />
        </div>
        <div class="form-group">
          <label class="form-label">Email *</label>
          <input class="form-input" id="intakeEmail" type="email" placeholder="email@example.com" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input class="form-input" id="intakePhone" placeholder="(555) 555-5555" />
        </div>
        <div class="form-group">
          <label class="form-label">Initial Signal Score</label>
          <input class="form-input" id="intakeScore" type="number" min="0" max="100" placeholder="0–100" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">YouTube Channel URL</label>
        <input class="form-input" id="intakeChannel" placeholder="https://youtube.com/@handle" />
      </div>
      <div class="form-group">
        <label class="form-label">Declared Niche / Topic Focus</label>
        <input class="form-input" id="intakeNiche" placeholder="e.g. IT professionals over 50, Azure for beginners" />
      </div>
      <div style="margin-top:8px">
        <button class="btn-gold" style="width:100%;padding:11px" onclick="submitIntake()">Create Client Record</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://htagojtlqatnagjsydnv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_dWO-jisLPddhxfIwcKeS8g_JLFi2tSb';
const headers = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

async function sbFetch(path, opts = {}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, { headers, ...opts });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

let allClients = [], allRuns = [];

async function loadDashboard() {
  try {
    allClients = await sbFetch('clients?select=*&order=signal_score.asc');
    allRuns = await sbFetch('diagnostic_runs?select=*&order=created_at.desc');
    renderSummary(); renderTable(); renderAttention();
    document.getElementById('headerMeta').textContent = 'Last updated ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  } catch(e) {
    document.getElementById('clientTableWrap').innerHTML = '<div class="loading" style="color:#E05555">Failed to load — check Supabase key / RLS</div>';
  }
}

function renderSummary() {
  const total = allClients.length;
  const avg = total ? Math.round(allClients.reduce((s,c) => s + (c.signal_score||0), 0) / total) : 0;
  const watch = allClients.filter(c => (c.signal_score||0) < 40).length;
  const improving = allClients.filter(c => {
    const runs = allRuns.filter(r => r.client_id === c.id).sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
    return runs.length >= 2 && (runs[0].score||0) > (runs[1].score||0);
  }).length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statAvg').textContent = avg + '/100';
  document.getElementById('statWatch').textContent = watch;
  document.getElementById('statImproving').textContent = improving;
}

function scoreBadgeClass(s) { return s >= 65 ? 'high' : s >= 40 ? 'mid' : 'low'; }
function statusClass(s) { return s >= 65 ? 'active' : s >= 40 ? 'watch' : 'critical'; }

function getDelta(clientId) {
  const runs = allRuns.filter(r => r.client_id === clientId).sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  return runs.length < 2 ? null : (runs[0].score||0) - (runs[1].score||0);
}

function fmtDelta(d) {
  if (d === null) return '<span class="delta flat">—</span>';
  if (d > 0) return `<span class="delta up">▲ ${d}</span>`;
  if (d < 0) return `<span class="delta down">▼ ${Math.abs(d)}</span>`;
  return '<span class="delta flat">→ 0</span>';
}

function renderTable() {
  document.getElementById('clientTableWrap').innerHTML = `
    <table>
      <thead><tr><th>Client</th><th>Niche</th><th>Score</th><th>Delta</th><th>90-Day</th><th>Status</th></tr></thead>
      <tbody>
        ${allClients.map(c => {
          const score = c.signal_score || 0;
          const delta = getDelta(c.id);
          const runs = allRuns.filter(r => r.client_id === c.id);
          const progress = Math.min(100, (runs.length / 6) * 100);
          return `<tr onclick="openClient('${c.id}')">
            <td class="name"><span class="status-dot ${statusClass(score)}"></span>${c.name}</td>
            <td class="niche" title="${c.niche||''}">${c.niche || '<em style="color:var(--muted)">—</em>'}</td>
            <td><span class="score-badge ${scoreBadgeClass(score)}">${score}</span></td>
            <td>${fmtDelta(delta)}</td>
            <td><div class="bar-container"><div class="bar-track"><div class="bar-fill" style="width:${progress}%"></div></div><div class="bar-label">${runs.length} runs</div></div></td>
            <td style="font-size:11px;color:var(--muted)">${score >= 65 ? 'On Track' : score >= 40 ? 'Watch' : 'Critical'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

function renderAttention() {
  const flagged = allClients.filter(c => (c.signal_score||0) < 40 || getDelta(c.id) < 0).slice(0, 8);
  document.getElementById('attentionList').innerHTML = flagged.length === 0
    ? '<div class="loading" style="color:var(--green)">✓ All clients on track</div>'
    : flagged.map(c => {
        const score = c.signal_score || 0;
        const delta = getDelta(c.id);
        return `<div class="attention-item" onclick="openClient('${c.id}')">
          <div class="attention-icon">${score < 40 ? '🔴' : '🟡'}</div>
          <div><div class="attention-name">${c.name}</div>
          <div class="attention-reason">${score < 40 ? `Score ${score}/100 — critical` : `Score dropped ${Math.abs(delta)} pts`}</div></div>
        </div>`;
      }).join('');
}

function openClient(clientId) {
  const client = allClients.find(c => c.id === clientId);
  if (!client) return;
  document.getElementById('modalClientName').textContent = client.name;
  document.getElementById('clientOverlay').classList.add('open');
  const runs = allRuns.filter(r => r.client_id === clientId).sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  const score = client.signal_score || 0;
  const channelUrl = client.channel_url || '';
  const niche = client.niche || '';
  const alignmentHtml = (() => {
    const r = runs.find(x => x.detected_niche);
    if (!r || !niche) return '<span style="color:var(--muted);font-style:italic">No data yet</span>';
    const match = r.detected_niche.toLowerCase().includes(niche.toLowerCase().split(' ')[0]);
    return match
      ? `<span style="color:var(--green)">✓ Aligned</span> — Declared: ${niche} / Detected: ${r.detected_niche}`
      : `<span style="color:var(--amber)">⚠ Drift</span> — Declared: ${niche} / Detected: ${r.detected_niche}`;
  })();
  const runHistoryHtml = runs.length === 0
    ? '<div style="color:var(--muted);font-size:13px">No runs recorded yet.</div>'
    : runs.map((r, i) => {
        const prev = runs[i+1];
        const delta = prev ? (r.score||0) - (prev.score||0) : null;
        const date = new Date(r.created_at).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
        return `<div class="run-history-row">
          <div><div class="run-date">${date}</div>${r.channel_pulse ? `<div style="font-size:11px;color:var(--muted);margin-top:2px">${r.channel_pulse}</div>` : ''}</div>
          <div style="display:flex;align-items:center;gap:10px">
            ${delta !== null ? `<span class="run-delta-badge ${delta >= 0 ? 'up' : 'down'}">${delta >= 0 ? '+' : ''}${delta}</span>` : ''}
            <span class="run-score" style="color:${score >= 65 ? 'var(--green)' : score >= 40 ? 'var(--amber)' : 'var(--red)'}">${r.score||0}/100</span>
          </div>
        </div>`;
      }).join('');
  const latestRun = runs[0];
  let repairHtml = '<div style="color:var(--muted);font-size:13px">No repair queue data.</div>';
  if (latestRun?.repair_queue) {
    let queue = latestRun.repair_queue;
    if (typeof queue === 'string') { try { queue = JSON.parse(queue); } catch(e) { queue = [{issue: queue, priority: 'HIGH'}]; } }
    if (Array.isArray(queue) && queue.length) repairHtml = queue.map(item => `<div class="repair-item"><span class="repair-priority">${item.priority||'HIGH'}</span><span>${item.issue||item}</span></div>`).join('');
  }
  document.getElementById('modalBody').innerHTML = `
    <div class="client-info-grid">
      <div class="info-block"><div class="info-label">Email</div><div class="info-value">${client.email || '<span class="empty">Not set</span>'}</div></div>
      <div class="info-block"><div class="info-label">Phone</div><div class="info-value">${client.phone || '<span class="empty">Not set</span>'}</div></div>
      <div class="info-block"><div class="info-label">Signal Score</div><div class="info-value"><span class="score-badge ${scoreBadgeClass(score)}" style="font-size:15px">${score}/100</span></div></div>
      <div class="info-block"><div class="info-label">Declared Niche</div><div class="info-value">${niche || '<span class="empty">Not declared</span>'}</div></div>
      <div class="info-block wide"><div class="info-label">YouTube Channel</div><div class="info-value">${channelUrl ? `<a href="${channelUrl}" target="_blank" rel="noopener">${channelUrl}</a>` : '<span class="empty">Not set</span>'}</div></div>
      <div class="info-block wide"><div class="info-label">Niche Alignment</div><div class="info-value">${alignmentHtml}</div></div>
    </div>
    <div class="section-title">Run History</div>${runHistoryHtml}
    <div class="section-title" style="margin-top:20px">Repair Queue — Latest Run</div>${repairHtml}`;
}

function closeModal() { document.getElementById('clientOverlay').classList.remove('open'); }
function openIntake() { document.getElementById('intakeOverlay').classList.add('open'); }
function closeIntake() {
  document.getElementById('intakeOverlay').classList.remove('open');
  ['intakeName','intakeEmail','intakePhone','intakeScore','intakeChannel','intakeNiche'].forEach(id => document.getElementById(id).value = '');
}

async function submitIntake() {
  const name = document.getElementById('intakeName').value.trim();
  const email = document.getElementById('intakeEmail').value.trim();
  if (!name || !email) { alert('Name and email are required.'); return; }
  try {
    await sbFetch('clients', { method: 'POST', body: JSON.stringify({
      name, email,
      phone: document.getElementById('intakePhone').value.trim() || null,
      signal_score: parseInt(document.getElementById('intakeScore').value) || 0,
      channel_url: document.getElementById('intakeChannel').value.trim() || null,
      niche: document.getElementById('intakeNiche').value.trim() || null,
      coach_id: 1
    })});
    closeIntake();
    showToast('Client added — ' + name);
    await loadDashboard();
  } catch(e) { alert('Error: ' + e.message); }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

document.getElementById('clientOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.getElementById('intakeOverlay').addEventListener('click', function(e) { if (e.target === this) closeIntake(); });
loadDashboard();
</script>
</body>
</html>
